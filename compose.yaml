services:
    laravel-app:
        build:
            context: .
            dockerfile: Dockerfile
        container_name: laravel-app-cont
        ports:
            - "8000:8000"
        volumes:
            - '.:/app'
        networks:
            - sail
        depends_on:
            - pgsql
        entrypoint: [/bin/sh, '-c']
        command:
            composer install
            php artisan migrate
            php artisan serve --host=0.0.0.0 --port=8000

    pgsql:
        image: 'postgres:18-alpine'
        container_name: postgresdb
        ports:
            - '5432:5432'
        environment:
            POSTGRES_DB: laravel-pet-db
            POSTGRES_USER: postgres
            POSTGRES_PASSWORD: postgres
        volumes:
            - '.data:/var/lib/postgresql'
        networks:
            - sail
        healthcheck:
            test:
                - CMD
                - pg_isready
                - '-q'
                - '-d'
                - '${DB_DATABASE}'
                - '-U'
                - '${DB_USERNAME}'
            retries: 3
            timeout: 5s
networks:
    sail:
        driver: bridge
volumes:
    sail-pgsql:
        driver: local
