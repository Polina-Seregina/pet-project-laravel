services:
  nginx:
    image: "nginx:stable-alpine"
    ports:
      - "8000:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - .:/var/www/laravel
    depends_on:
      - mysql
      - php
  php:
    build: 
      context: dockerfiles
      dockerfile: Dockerfile
    volumes:
      - .:/var/www/laravel
    container_name: app_container
  mysql:
    image: mysql:8.0
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: laravel-pet-db
      MYSQL_USER: laravel
      MYSQL_PASSWORD: password
      MYSQL_ROOT_PASSWORD: password
    volumes:
      - db_data:/var/lib/mysql
    container_name: mysql_container

  mysql_testing:
    image: mysql:8.0
    ports:
      - "3307:3306"
    environment:
      MYSQL_DATABASE: testdb
      MYSQL_USER: testuser
      MYSQL_PASSWORD: password
      MYSQL_ROOT_PASSWORD: password
    volumes:
      - db_data:/var/lib/mysqltesting
    container_name: mysql_testing

  composer:
    build:
      context: dockerfiles
      dockerfile: Dockerfile_composer
    volumes:
      - .:/var/www/laravel
    command: install
  artisan:
    build:
      context: dockerfiles
      dockerfile: Dockerfile
    volumes:
      - .:/var/www/laravel
    entrypoint: ["php", "/var/www/laravel/artisan"]
    depends_on:
      - mysql_testing
  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    ports: 
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: laravel
      MINIO_ROOT_PASSWORD: password
    volumes:
      - minio_data:/data
volumes:
  db_data:
  minio_data: